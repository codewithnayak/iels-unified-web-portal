trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: GKE-Variables # contains gcpKeyBase64, dockerhubUser, dockerhubPass

  - name: NODE_VERSION
    value: "20"

  - name: DOCKERHUB_USERNAME
    value: "$(dockerhubUser)"

  - name: DOCKERHUB_PASSWORD
    value: "$(dockerhubPass)"

  - name: IMAGE_NAME
    value: "iels-unified-web-app"

  - name: APP_NAME
    value: "iels-unified-web-app"

  - name: IMAGE_TAG
    value: "$(Build.BuildId)"

  - name: GCP_KEY_BASE64
    value: "$(gcpKeyBase64)" # Base64 encoded JSON key

  - name: GCP_PROJECT
    value: "iels-org"

  - name: GKE_CLUSTER
    value: "autopilot-cluster-1"

  - name: HELM_NAMESPACE
    value: "iels-dev"

steps:
  # Install Node
  - task: NodeTool@0
    inputs:
      versionSpec: "$(NODE_VERSION)"
    displayName: "Install Node.js"

  # Install dependencies
  - script: npm ci
    displayName: "Install dependencies"

  # Build React app
  - script: npm run build
    displayName: "Build React app"

  # Install Docker
  - task: DockerInstaller@0
    displayName: "Install Docker"

  # Build + Push Docker image
  - script: |
      echo "Logging into Docker Hub..."
      echo "$(DOCKERHUB_PASSWORD)" | docker login -u "$(DOCKERHUB_USERNAME)" --password-stdin

      echo "Building Docker image..."
      docker build -t $(DOCKERHUB_USERNAME)/$(IMAGE_NAME):$(IMAGE_TAG) .

      echo "Pushing image..."
      docker push $(DOCKERHUB_USERNAME)/$(IMAGE_NAME):$(IMAGE_TAG)
    displayName: "Build and push Docker image to Docker Hub"

  # Install gcloud CLI
  - script: |
      echo "Installing Google Cloud SDK..."
      sudo apt-get update
      sudo apt-get install -y apt-transport-https ca-certificates gnupg
      echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
      curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
      sudo apt-get update && sudo apt-get install -y google-cloud-cli
    displayName: "Install Google Cloud SDK"

  # ⭐ Install GKE auth plugin (required for kubectl/helm)
  - script: |
      echo "Installing GKE auth plugin..."
      sudo apt-get update
      sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin
    displayName: "Install GKE Auth Plugin"

  # Authenticate to GKE using Base64 key
  - script: |
      echo "Decoding GCP key..."
      echo "$GCP_KEY_BASE64" | base64 --decode > key.json

      echo "Authenticating..."
      gcloud auth activate-service-account --key-file=key.json

      echo "Setting project..."
      gcloud config set project $(GCP_PROJECT)

      echo "Fetching GKE credentials..."
      gcloud container clusters get-credentials $(GKE_CLUSTER) \
      --region europe-west12 \
      --project $(GCP_PROJECT)
    displayName: "Authenticate to GKE"

  # Install Helm
  - task: HelmInstaller@1
    inputs:
      helmVersion: "3.12.0"
    displayName: "Install Helm"

  # Deploy Helm chart to GKE
  - script: |
      helm upgrade --install $APP_NAME ./helm \
        --namespace $(HELM_NAMESPACE) \
        --create-namespace \
        --set image.repository=docker.io/$(DOCKERHUB_USERNAME)/$(IMAGE_NAME) \
        --set image.tag=$(IMAGE_TAG)
    displayName: "Deploy Helm chart to GKE"
